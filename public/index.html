<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación</title>
<style>
  body { font-family: Arial; background:#1e1e2f; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
  #box { background:#2b2b45; padding:30px; border-radius:12px; text-align:center; }
  h1 { color:#00BFFF; }
  #success { display:none; color:#00FF7F; margin-top:20px; }
  #invalid { display:none; color:#FF5555; margin-top:20px; }
  #verifyBtn { padding:12px 25px; background:#00BFFF; color:white; border:none; border-radius:8px; cursor:pointer; }
  #verifyBtn:hover { background:#0095d1; }
</style>
</head>
<body>
<div id="box">
  <h1>🔒 Verificación</h1>
  <p>Presiona el botón para completar tu verificación</p>
  <button id="verifyBtn">Completar Verificación</button>
  <div id="success">✅ ¡Verificación completada!</div>
  <div id="invalid">❌ Link inválido o expirado</div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const btn = document.getElementById('verifyBtn');
  const success = document.getElementById('success');
  const invalid = document.getElementById('invalid');

  if(id){
    btn.addEventListener('click', ()=>{
      fetch(`https://TU-BOT-SERVER.onrender.com/verificar/${id}`)
        .then(res=>{
          if(res.ok){ btn.style.display='none'; success.style.display='block'; }
          else{ btn.style.display='none'; invalid.style.display='block'; }
        }).catch(()=>{
          btn.style.display='none'; invalid.style.display='block';
        });
    });
  } else {
    btn.style.display='none'; invalid.style.display='block';
  }
</script>
</body>
</html>
